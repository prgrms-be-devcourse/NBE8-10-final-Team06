name: Deploy to EC2
on:
  push:
    branches: [ main , develop ] # 메인, 디벨롭 브랜치에 푸시될 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd backend/devstagram
          chmod +x ./gradlew
          ./gradlew clean build -x test # 테스트는 일단 제외하고 빌드

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest ./backend/devstagram
          docker push ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }} # 🔑 만약 키페어 방식이 아니라면 다른 방식이 필요해요!
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest
            docker stop backend || true
            docker rm backend || true
            docker run -d --name backend -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.RDS_ENDPOINT }}:5432/devstagram \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest