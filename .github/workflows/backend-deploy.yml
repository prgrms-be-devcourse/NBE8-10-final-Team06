name: Backend Deploy to EC2

on:
  push:
    branches:
      - main
      - Feat/infra-redis

jobs:
  # 1. 다음 버전 번호를 미리 계산 (Dry Run 방식)
  calculate-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_action.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate next tag
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true # 실제로 태그를 찍지 않고 번호만 계산합니다.

  # 2. 빌드 및 배포 작업
  build-and-deploy:
    needs: calculate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.calculate-tag.outputs.new_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Gradle 빌드 (테스트는 제외하여 빌드 속도 향상)
      - name: Build with Gradle
        run: |
          cd backend/devstagram
          chmod +x gradlew
          ./gradlew build -x test

      # GitHub Container Registry(GHCR) 로그인
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 도커 이미지 빌드 및 GHCR 푸시 (계산된 버전 태그 사용)
      - name: Build and Push Docker Image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BASE_NAME="ghcr.io/$REPO_OWNER/$REPO_NAME-backend"
          
          docker build -t $BASE_NAME:latest -t $BASE_NAME:${{ env.VERSION }} ./backend/devstagram
          docker push $BASE_NAME:latest
          docker push $BASE_NAME:${{ env.VERSION }}

      # 설정 파일(infra 폴더 내 docker-compose, nginx, prometheus 등)을 EC2로 전송
      - name: Copy infra files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infra/docker-compose.yml,infra/nginx/nginx.conf,infra/nginx/conf.d/service-env.inc,infra/prometheus/prometheus.yml"
          target: "/home/ec2-user/"
          strip_components: 1

      # EC2 서버에서 Blue-Green 무중단 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: VERSION
          script: |
            cd /home/ec2-user
            
            # [Step 0] 애플리케이션 실행을 위한 .env 환경 변수 생성
            echo "SPRING_PROFILES_ACTIVE=prod" > .env
            echo "SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.RDS_ENDPOINT }}:5432/devstagram" >> .env
            echo "SPRING_DATASOURCE_USERNAME=postgres" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> .env
            echo "SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver" >> .env
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            echo "JWT_ACCESS_TOKEN_EXPIRE_SECONDS=${{ secrets.JWT_ACCESS_TOKEN_EXPIRE_SECONDS }}" >> .env
            echo "GITHUB_OWNER=${{ github.repository_owner }}" >> .env
            echo "IMAGE_VERSION=$VERSION" >> .env
            
            # S3 관련 설정 추가
            echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}" >> .env
            echo "AWS_ACCESS_KEY=managed-by-iam-role" >> .env
            echo "AWS_SECRET_KEY=managed-by-iam-role" >> .env

            # [Step 1] 현재 실행 중인 색상 확인 및 타겟 색상 결정
            EXIST_BLUE=$(sudo docker ps | grep backend-blue)
            if [ -z "$EXIST_BLUE" ]; then
                TARGET_COLOR="blue"; TARGET_PORT=8081; BEFORE_COLOR="green"
            else
                TARGET_COLOR="green"; TARGET_PORT=8082; BEFORE_COLOR="blue"
            fi
            
            # 필요한 디렉토리 생성 (안전 장치)
            sudo mkdir -p /home/ec2-user/prometheus
            sudo mkdir -p /home/ec2-user/nginx/conf.d

            # [Step 2] 새 버전 이미지 풀링 및 컨테이너 실행 (Nginx 및 모니터링 도구 포함)
            sudo docker compose pull redis nginx prometheus grafana node-exporter backend-$TARGET_COLOR
            sudo docker compose up -d redis nginx backend-$TARGET_COLOR prometheus grafana node-exporter

            # [Step 3] 새 컨테이너가 정상적으로 떴는지 Actuator Health 체크
            echo "새 컨테이너($TARGET_COLOR) 헬스체크 시작..."
            for retry in {1..12}
            do
                HEALTH=$(curl -s http://localhost:$TARGET_PORT/actuator/health | grep "UP" || echo "fail")
                if [ "$HEALTH" != "fail" ]; then
                    echo "--- 애플리케이션 건강 상태 확인 완료 (UP)! ---"
                    break
                fi
                echo "대기 중... ($retry/12)"
                sleep 5
                if [ $retry -eq 12 ]; then exit 1; fi
            done

            # [Step 4] Nginx 트래픽을 새 컨테이너로 전환
            echo "set \$service_url http://backend-$TARGET_COLOR:8080;" | sudo tee /home/ec2-user/nginx/conf.d/service-env.inc
            sudo docker exec nginx nginx -s reload

            # [Step 5] 이전 버전 컨테이너 정리
            sleep 5
            sudo docker compose stop backend-$BEFORE_COLOR
            sudo docker compose rm -f backend-$BEFORE_COLOR
            sudo docker image prune -f
            echo "### 무중단 배포 완료 ###"

  # 3. 배포 성공 시 GitHub 공식 릴리스 생성 (Main/Develop 브랜치만 해당)
  make-release:
    needs: [build-and-deploy, calculate-tag]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-tag.outputs.new_tag }}
          name: Release ${{ needs.calculate-tag.outputs.new_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}