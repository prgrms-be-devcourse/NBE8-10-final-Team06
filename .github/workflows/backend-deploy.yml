name: Backend Deploy to EC2

on:
  push:
    branches:
      - main
      - develop
      - Feat/user-profile-image  # 🔥 여기서 테스트!
    # paths:                    # 🔥 infra 수정 시에도 돌게 하려면 일단 주석!
    #   - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 1. 빌드 (Gradle)
      - name: Build with Gradle
        run: |
          cd backend/devstagram
          chmod +x gradlew
          ./gradlew build -x test

      # 2. 도커 로그인 (GHCR)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      # 3. 도커 이미지 빌드 & 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest ./backend/devstagram
          docker push ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest

      # 4. EC2 서버에 접속해서 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 모든 docker 명령어 앞에 sudo를 추가합니다!
            sudo docker pull ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest
            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker run -d --name backend -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.RDS_ENDPOINT }}:5432/devstagram \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              -e JWT_ACCESS_TOKEN_EXPIRE_SECONDS=${{ secrets.JWT_ACCESS_TOKEN_EXPIRE_SECONDS }} \
              ghcr.io/${{ github.repository_owner }}/devstagram-backend:latest