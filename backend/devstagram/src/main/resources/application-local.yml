spring:
  cloud:
    aws:
      s3:
        enabled: false
      region:
        static: us-east-1
        auto: false
      credentials:
        instance-profile: false
        web-identity-token-file: false

  datasource:
    url: jdbc:postgresql://localhost:5432/devstagram
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    org.springframework.orm.jpa: INFO
    com.devstagram.domain.user.controller.FollowController: INFO
    com.devstagram.domain.user.service.FollowService: INFO

storage:
  location: ./uploads

custom:
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    auth:
      enabled: true
      window-seconds: 60
      login-ip-limit: 10000
      login-email-limit: 10000
      signup-ip-limit: 10000
      check-email-ip-limit: 10000
      check-nickname-ip-limit: 10000
  cookie:
    secure: false
    same-site: Lax