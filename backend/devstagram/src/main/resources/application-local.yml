spring:
  datasource:
    # 도커 데스크탑으로 띄운 Postgres 주소
    url: jdbc:postgresql://localhost:5432/devstagram
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      # 테이블은 자동 생성하되 데이터는 보존
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true