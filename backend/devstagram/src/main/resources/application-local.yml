spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/devstagram
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

custom:
  rate-limit:
    auth:
      enabled: true
      window-seconds: 60
      login-ip-limit: 10000
      login-email-limit: 10000
      signup-ip-limit: 10000
      check-email-ip-limit: 10000
      check-nickname-ip-limit: 10000
  cookie:
    secure: false
    same-site: Lax