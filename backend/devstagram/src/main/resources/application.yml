spring:
  profiles:
    # 1. 외부(Docker -e)에서 넣어주는 값이 없으면 기본적으로 dev를 사용합니다.
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:./backend/devstagram/.env[.properties]
  data:
    redis:
      host: localhost
      port: 6379
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8080

storage:
  location: ${STORY_MEDIA_STORAGE_PATH:./uploads}
  # .env에 본인의 로컬 프로젝트 파일 경로 STORY_MEDIA_STORAGE_PATH 설정

custom:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS}
    refresh-token-expire-seconds: ${JWT_REFRESH_TOKEN_EXPIRE_SECONDS}

file:
  upload-dir: ${DEVSTAGRAM_STORAGE_PATH:/tmp/devstagram/uploads/}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json