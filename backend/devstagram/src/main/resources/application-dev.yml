spring:
  cloud:
    aws:
      s3:
        enabled: false
      region:
        static: us-east-1
        auto: false
      credentials:
        instance-profile: false
        web-identity-token-file: false

  datasource:
    url: jdbc:h2:file:./data/devdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true

  file:
    upload-dir: ${DEVSTAGRAM_STORAGE_PATH:/tmp/devstagram/uploads/}

storage:
  location: ./uploads