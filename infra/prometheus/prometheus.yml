global:
  scrape_interval: 5s

scrape_configs:

  - job_name: spring
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend-blue:8080
          - backend-green:8080

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: influxdb
    static_configs:
      - targets:
          - influxdb:8086