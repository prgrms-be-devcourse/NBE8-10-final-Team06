version: '3.8'

services:
  # 1. Spring Boot 서비스
  app:
    image: ghcr.io/prgrms-be-devcourse/devstagram-backend:latest
    container_name: devstagram-app
    network_mode: host
    restart: always
    environment:
      - SPRING_DATASOURCE_URL
      - SPRING_DATASOURCE_USERNAME
      - SPRING_DATASOURCE_PASSWORD
      - JWT_SECRET_KEY
      - JWT_ACCESS_TOKEN_EXPIRE_SECONDS

  # 2. Nginx 서비스
  nginx:
    image: nginx:latest
    container_name: nginx
    network_mode: host
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt  # 인증서 파일 공유용
      - ./data/certbot/www:/var/www/certbot    # 인증 시 챌린지 파일 공유용
    depends_on:
      - app

  # 3. Certbot 서비스 (nginx와 같은 줄에 위치해야 함!)
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # 4. 프로메테우스 서비스
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 5. 그라파나
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"

  #6. Node expoter
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"