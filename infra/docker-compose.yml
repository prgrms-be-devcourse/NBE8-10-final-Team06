version: '3.8'

services:
  # [1] Blue 서비스 (포트 8081)
  backend-blue:
    image: ghcr.io/dohwa-owner/nbe8-10-final-team06-backend:latest
    container_name: backend-blue
    restart: always
    env_file: .env
    ports:
      - "8081:8080"
    networks:
      - devstagram-net

  # [2] Green 서비스 (포트 8082)
  backend-green:
    image: ghcr.io/dohwa-owner/nbe8-10-final-team06-backend:latest
    container_name: backend-green
    restart: always
    env_file: .env
    ports:
      - "8082:8080"
    networks:
      - devstagram-net

  # [3] Nginx (관리소장: 80/443 포트 담당)
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 1. 전체 설정 파일 매핑
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # ⭐ 2. 바로 이 줄! (conf.d 폴더 전체를 매핑)
      # 내 컴퓨터의 ./nginx/conf.d 폴더를 컨테이너의 /etc/nginx/conf.d로 연결해라!
      - ./nginx/conf.d:/etc/nginx/conf.d

      # 3. 인증서 관련 매핑 (기존 도화님 설정)
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - backend-blue
      - backend-green
    networks:
      - devstagram-net

  # [4] Certbot (인증서 자동 갱신)
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - devstagram-net
      
# 4. 프로메테우스 서비스
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 5. 그라파나
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"

  #6. Node expoter
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
      
networks:
  devstagram-net:
    driver: bridge
    