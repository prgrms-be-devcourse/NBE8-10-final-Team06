events {
    worker_connections 1024;
}

http {
    # 1. HTTP(80) -> HTTPS(443) 강제 이동
    server {
        listen 80;
        server_name devstagram.site;

        # Certbot 인증용 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 모든 80 포트 접속을 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS(443) 설정
    server {
        listen 443 ssl;
        server_name devstagram.site;

        # 인증서 파일 경로
        ssl_certificate /etc/letsencrypt/live/devstagram.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devstagram.site/privkey.pem;

        # 보안 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # ⭐ 무중단 배포 핵심: 타겟 정보를 담은 외부 파일을 읽어옴
        # 이 파일에는 "set $service_url http://backend-blue:8080;" 이런 내용이 들어갑니다.
        include /etc/nginx/conf.d/service-env.inc;

        location / {
            proxy_pass $service_url; # 변수를 사용하여 Blue/Green 동적 스위칭
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger UI를 위한 설정 (마찬가지로 변수 사용)
        location /swagger-ui/ {
            proxy_pass $service_url/swagger-ui/;
            proxy_set_header Host $host;
        }

        location /v3/api-docs {
            proxy_pass $service_url/v3/api-docs;
            proxy_set_header Host $host;
        }
    }
}