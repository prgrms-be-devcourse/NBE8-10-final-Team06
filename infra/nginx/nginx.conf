events {
    worker_connections 1024;
}

http {
    # MIME 타입 (CSS, JS, 이미지 등 Content-Type 정상 응답)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 도커 내부 DNS 서버 주소 설정
    resolver 127.0.0.11;

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name devstagram.site;

        # Certbot 인증용 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS(443) 설정
    server {
        listen 443 ssl;
        server_name devstagram.site;

        ssl_certificate /etc/letsencrypt/live/devstagram.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devstagram.site/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # ⭐ 무중단 배포 핵심: Blue/Green 타겟 URL
        include /etc/nginx/conf.d/service-env.inc;

        # ── 백엔드 API 프록시 ──────────────────────────────
        location /api/ {
            proxy_pass $service_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 업로드 파일 프록시 ────────────────────────────
        location /uploads/ {
            proxy_pass $service_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 미디어 리소스 프록시 ──────────────────────────
        location /temp/media/ {
            proxy_pass $service_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket(STOMP) 프록시 ───────────────────────
        location /ws {
            proxy_pass $service_url;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # ── 프론트엔드 SPA 정적 파일 ──────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}