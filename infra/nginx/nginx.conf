events {
    worker_connections 1024;
}

http {
    # 1. HTTP(80) -> HTTPS(443) 강제 이동
    server {
        listen 80;
        server_name devstagram.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS(443) 설정
    server {
        listen 443 ssl;
        server_name devstagram.site;

        # 인증서 파일 경로 (방금 발급받은 경로와 일치)
        ssl_certificate /etc/letsencrypt/live/devstagram.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devstagram.site/privkey.pem;

        # 보안 설정 (추천)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger UI를 위한 설정
        location /swagger-ui/ {
            proxy_pass http://localhost:8080/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /v3/api-docs {
            proxy_pass http://localhost:8080/v3/api-docs;
        }
    }
}